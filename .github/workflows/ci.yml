name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest -q

      - name: Lint
        run: |
          ruff check .
          mypy joypad/config/types.py joypad/config/twitch.py joypad/input/xinput.py joypad/ui/editor/layout.py joypad/ui/editor/input.py joypad/ui/editor/slots.py joypad/input/watch.py
