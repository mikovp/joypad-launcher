[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "joypad-launcher"
version = "0.1.0"
description = "Gamepad-controlled game launcher for Steam, Epic and Switch (Windows, pygame)."
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.8"
dependencies = [
    "pygame>=2.5.0",
    "vdf>=3.4",
]

[project.optional-dependencies]
dev = ["pytest>=7.0", "ruff>=0.6", "mypy>=1.8"]

[project.scripts]
joypad-launcher = "joypad.app:main"

[tool.setuptools]
packages = ["joypad", "joypad.bootstrap", "joypad.config", "joypad.config.settings", "joypad.config.theme", "joypad.games", "joypad.covers", "joypad.covers.cache", "joypad.covers.cdn", "joypad.covers.cdn.sources", "joypad.launch", "joypad.input", "joypad.input.profiles", "joypad.input.profiles.notation", "joypad.input.remap_engine", "joypad.input.remap_loop", "joypad.input.remap_loop.win32", "joypad.input.sendinput", "joypad.input.sendinput.win32", "joypad.input.watch", "joypad.input.watch.win32", "joypad.input.worker", "joypad.input.xinput", "joypad.integrations", "joypad.integrations.epic", "joypad.integrations.steam", "joypad.integrations.twitch", "joypad.integrations.vdf", "joypad.ui", "joypad.ui.loop", "joypad.ui.loop.events", "joypad.ui.overlay", "joypad.ui.overlay.menu", "joypad.ui.views", "joypad.ui.views.list", "joypad.ui.views.tiles", "joypad.ui.views.tiles.navigation", "joypad.ui.editor", "joypad.ui.editor.drawing", "joypad.ui.editor.drawing.grid", "joypad.ui.editor.drawing.pad", "joypad.ui.editor.input", "joypad.ui.editor.slots", "joypad.platform", "joypad.platform.windows", "joypad.platform.windows.hwnd", "ddcci"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
target-version = "py38"
line-length = 120

[tool.ruff.lint]
# E/F = pyflakes+pycodestyle errors, I = import sorting, UP = pyupgrade, B = bugbear
select = ["E", "F", "I", "B", "UP"]
ignore = [
    "E501",   # line length handled by formatter, not enforced hard
    "E741",   # ambiguous var names (l, etc.) used in existing layout code
    "UP031",  # printf-style %-formatting kept as-is (legacy, pervasive); not worth churn
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["E402"]
"ddcci/*" = ["UP004", "UP032"]

[tool.mypy]
# Analysis target (mypy needs >=3.10); runtime still supports 3.8 via
# `from __future__ import annotations`.
python_version = "3.10"
ignore_missing_imports = true   # pygame/vdf/ctypes-win have no stubs here
warn_unused_ignores = false
check_untyped_defs = false
# Gradual typing: do not require annotations yet.
disallow_untyped_defs = false

[[tool.mypy.overrides]]
module = [
    "joypad.config.types",
    "joypad.config.twitch",
    "joypad.ui.editor.layout",
    "joypad.ui.editor.input",
]
check_untyped_defs = true
warn_return_any = true

[[tool.mypy.overrides]]
module = [
    "joypad.input.xinput",
    "joypad.input.remap_engine",
]
check_untyped_defs = true

[[tool.mypy.overrides]]
module = [
    "joypad.ui.editor.slots",
    "joypad.input.watch",
]
check_untyped_defs = true
